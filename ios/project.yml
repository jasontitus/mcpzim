# XcodeGen spec. Run `xcodegen generate` (or `brew install xcodegen` first)
# to produce MCPZimChat.xcodeproj. Keeping the declarative spec in git means
# the Xcode project itself is regeneratable and diff-friendly.

name: MCPZimChat
options:
  bundleIdPrefix: org.mcpzim
  deploymentTarget:
    iOS: 17.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""          # fill in your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  MCPZimKit:
    path: ../swift
  # Uncomment once you've vendored Swift-Gemma4-Core into your workspace, or
  # add it via Xcode's File > Add Packages UI after generating the project.
  # Gemma4SwiftCore:
  #   url: https://github.com/yejingyang8963-byte/Swift-gemma4-core.git
  #   from: 0.1.0
targets:
  MCPZimChat:
    type: application
    platform: iOS
    sources:
      - path: MCPZimChat
        excludes:
          - "**/.DS_Store"
    info:
      path: MCPZimChat/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: MCPZim Chat
        NSDocumentsFolderUsageDescription: "Needed to read ZIM archives you drop into the app's Documents folder."
    dependencies:
      - package: MCPZimKit
        product: MCPZimKit
      # - package: Gemma4SwiftCore
      #   product: Gemma4SwiftCore
      # Vendor CoreKiwix.xcframework (from kiwix-build or a Kiwix release)
      # into MCPZimChat/Frameworks/ and uncomment:
      # - framework: MCPZimChat/Frameworks/CoreKiwix.xcframework
      #   embed: true
      #   codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.mcpzim.MCPZimChat
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "MCPZim Chat"
