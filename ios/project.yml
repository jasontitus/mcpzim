# XcodeGen spec. Run `xcodegen generate` (or `brew install xcodegen` first)
# to produce MCPZimChat.xcodeproj. Keeping the declarative spec in git means
# the Xcode project itself is regeneratable and diff-friendly.

name: MCPZimChat
options:
  bundleIdPrefix: org.mcpzim
  deploymentTarget:
    iOS: 18.0
    macOS: 15.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: ""          # fill in your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  MCPZimKit:
    path: ../swift
  # Vendored fork of https://github.com/ml-explore/mlx-swift-lm (pin 3.31.3).
  # Local patch inserts a `QuantizedKVCacheProtocol` branch into
  # `Libraries/MLXLLM/Models/Gemma4Text.swift::Gemma4Attention.callAsFunction`
  # so MLX's 4-bit groupwise `QuantizedKVCache` runs end-to-end —
  # upstream calls `cache.update(...)` unconditionally and MLX's
  # quantized cache rejects that with a runtime assertion. The patch
  # also dequantizes the full-history K/V on the way out so
  # downstream KV-shared layers (Gemma 4's layers 15..34 donating
  # from 0..14) still see full history. See `KV_CACHE_COMPRESSION.md`
  # Option 1 for the rationale and upstream-PR plan.
  mlx-swift-lm:
    path: LocalPackages/mlx-swift-lm
  # `#huggingFaceLoadModelContainer` / `#hubDownloader` /
  # `#huggingFaceTokenizerLoader` macros live here. Expansions
  # reference `HuggingFace.HubClient` (from swift-huggingface) and
  # `Tokenizers.AutoTokenizer` (from swift-transformers), so those
  # two deps have to be resolvable from the app module too.
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers.git
    from: 1.3.0
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface.git
    from: 0.9.0
  # High-quality on-device TTS (Kokoro v1.0 via MLX). Vendored as a
  # local path because upstream kokoro-ios pins `mlx-swift` to exact
  # 0.30.2 which conflicts with Swift-gemma4-core's 0.31+ requirement.
  # We keep a patched Package.swift under LocalPackages/kokoro-ios
  # that relaxes the constraint (same fix CastCircle applied in its
  # vendored copy). The first launch after install can fetch the
  # model (~312 MB bf16 safetensors) + voices pack into Application
  # Support/models/kokoro_mlx/. Without the download, voice chat
  # falls back to AVSpeechSynthesizer.
  KokoroSwift:
    path: LocalPackages/kokoro-ios
  # MLXUtilsLibrary exposes `NpyzReader` which we use directly to
  # decode the Kokoro voices.npz archive. KokoroSwift is built as a
  # dynamic library so transitive symbols aren't visible to us;
  # declaring this as a direct package dep pulls the static lib into
  # our link set so `NpyzReader.read(...)` resolves.
  MLXUtilsLibrary:
    url: https://github.com/mlalma/MLXUtilsLibrary.git
    from: 0.0.6
targets:
  MCPZimChat:
    type: application
    platform: iOS
    scheme:
      testTargets: []
      gatherCoverageData: false
    sources:
      - path: MCPZimChat
        excludes:
          - "**/.DS_Store"
    info:
      path: MCPZimChat/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: Zimfo
        NSDocumentsFolderUsageDescription: "Needed to read ZIM archives you drop into the app's Documents folder."
        NSLocationWhenInUseUsageDescription: "Zimfo uses your location for routing and \"what's nearby\" queries. All lookups stay on-device."
        NSMicrophoneUsageDescription: "Zimfo uses the microphone for hands-free voice chat with the on-device model. Audio is transcribed locally and never leaves the device."
        NSSpeechRecognitionUsageDescription: "Zimfo transcribes your voice on-device using Apple's speech recognizer. Nothing is sent to Apple or any server."
    dependencies:
      - package: MCPZimKit
        product: MCPZimKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: swift-huggingface
        product: HuggingFace
      - package: KokoroSwift
        product: KokoroSwift
        embed: true
        codeSign: true
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
      - framework: MCPZimChat/Frameworks/CoreKiwix.xcframework
        embed: false
        codeSign: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.mcpzim.MCPZimChat
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Zimfo"
        CODE_SIGN_ENTITLEMENTS: MCPZimChat/MCPZimChat-iOS.entitlements
        # LibzimBridge.h/mm is a no-op until CoreKiwix.xcframework is linked
        # (both files wrap their contents in `__has_include(<zim/archive.h>)`),
        # so keeping the bridging header wired up here is safe in either state.
        SWIFT_OBJC_BRIDGING_HEADER: MCPZimChat/Libzim/LibzimBridge.h
        SWIFT_OBJC_INTEROP_MODE: objcxx
        CLANG_ENABLE_MODULES: "YES"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"

  MCPZimChatMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MCPZimChatMacTests
    dependencies:
      - target: MCPZimChatMac
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MCPZimChatMac.app/Contents/MacOS/MCPZimChatMac"
        PRODUCT_BUNDLE_IDENTIFIER: org.mcpzim.MCPZimChatMacTests
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_TESTABILITY: "YES"
        # Matches the app target: CoreKiwix has C++ headers so the test
        # module scanner needs libc++ too.
        SWIFT_OBJC_INTEROP_MODE: objcxx
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
    scheme:
      testTargets:
        - MCPZimChatMacTests

  MCPZimChatMac:
    type: application
    platform: macOS
    sources:
      - path: MCPZimChat
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
    info:
      path: MCPZimChat/Info-Mac.plist
      properties:
        CFBundleDisplayName: Zimfo
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026"
        NSLocationUsageDescription: "Zimfo uses your location for routing and \"what's nearby\" queries. All lookups stay on-device."
        NSLocationWhenInUseUsageDescription: "Zimfo uses your location for routing and \"what's nearby\" queries. All lookups stay on-device."
        NSMicrophoneUsageDescription: "Zimfo uses the microphone for hands-free voice chat with the on-device model. Audio is transcribed locally and never leaves the device."
        NSSpeechRecognitionUsageDescription: "Zimfo transcribes your voice on-device using Apple's speech recognizer. Nothing is sent to Apple or any server."
    dependencies:
      - package: MCPZimKit
        product: MCPZimKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: swift-huggingface
        product: HuggingFace
      - package: KokoroSwift
        product: KokoroSwift
        embed: true
        codeSign: true
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
      - framework: MCPZimChat/Frameworks/CoreKiwix.xcframework
        embed: false
        codeSign: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.mcpzim.MCPZimChatMac
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_OBJC_BRIDGING_HEADER: MCPZimChat/Libzim/LibzimBridge.h
        SWIFT_OBJC_INTEROP_MODE: objcxx
        CLANG_ENABLE_MODULES: "YES"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
        CODE_SIGN_ENTITLEMENTS: MCPZimChat/MCPZimChat.entitlements
    scheme:
      testTargets: []
      gatherCoverageData: false
